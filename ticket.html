<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tickets – Tixmo </title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #ebebeb;
font-family: -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, ‘Helvetica Neue’, sans-serif;
min-height: 100vh;
}

/* ── KEYFRAMES ── */
@keyframes fadeDown {
from { opacity: 0; transform: translateY(-18px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(24px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes cardReveal {
0%   { opacity: 0; transform: translateY(40px) scale(0.93) rotateX(6deg); }
100% { opacity: 1; transform: translateY(0) scale(1) rotateX(0deg); }
}
@keyframes ticketFloat {
0%,100% { transform: translateY(0);    filter: drop-shadow(0 8px 28px rgba(82,36,200,0.28)); }
50%      { transform: translateY(-6px); filter: drop-shadow(0 18px 40px rgba(82,36,200,0.42)); }
}
@keyframes gradShift {
0%,100% { background-position: 0% 50%; }
50%      { background-position: 100% 50%; }
}
@keyframes shimmer {
0%   { transform: translateX(-100%) skewX(-12deg); }
100% { transform: translateX(380%)  skewX(-12deg); }
}
@keyframes blobPulse {
0%,100% { border-radius: 60% 40% 55% 45% / 50% 60% 40% 55%; transform: scale(1); }
50%      { border-radius: 45% 55% 40% 60% / 60% 45% 55% 40%; transform: scale(1.05); }
}
@keyframes starSpin {
from { transform: rotate(0deg) scale(1); }
to   { transform: rotate(360deg) scale(1); }
}
@keyframes starPop {
0%   { opacity: 0; transform: scale(0); }
60%  { transform: scale(1.2); }
100% { opacity: 1; transform: scale(1); }
}
@keyframes numberReveal {
from { opacity: 0; letter-spacing: 6px; filter: blur(4px); }
to   { opacity: 1; letter-spacing: 0.3px; filter: blur(0); }
}
@keyframes btnPulse {
0%,100% { box-shadow: 0 0 0 0 rgba(82,54,200,0.5); }
50%      { box-shadow: 0 0 0 12px rgba(82,54,200,0); }
}
@keyframes btnShimmer {
0%   { transform: translateX(-100%) skewX(-15deg); }
100% { transform: translateX(380%)  skewX(-15deg); }
}
@keyframes amountGlow {
0%,100% { text-shadow: 0 0 8px rgba(255,220,80,0.4); }
50%      { text-shadow: 0 0 20px rgba(255,220,80,0.9), 0 0 40px rgba(255,180,40,0.5); }
}
@keyframes ribbonSlide {
from { opacity: 0; transform: translateX(30px); }
to   { opacity: 1; transform: translateX(0); }
}

/* ── HEADER ── */
.header {
background: #fff;
padding: 16px 20px;
display: flex;
align-items: center;
justify-content: space-between;
border-bottom: 1px solid #eee;
animation: fadeDown 0.5s ease both;
}
.logo-wrap { display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 36px; height: 36px; }
.logo-icon svg { width: 100%; height: 100%; }
.logo-text-wrap { display: flex; flex-direction: column; line-height: 1.05; }
.logo-dream { font-size: 15px; font-weight: 900; color: #111; letter-spacing: 1.5px; }
.logo-dubai { font-size: 15px; font-weight: 900; color: #111; letter-spacing: 1.5px; }
.hamburger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
.hamburger span { display: block; width: 24px; height: 2.5px; background: #111; border-radius: 2px; transition: transform 0.3s; }
.hamburger:hover span:nth-child(1) { transform: scaleX(0.7); }
.hamburger:hover span:nth-child(3) { transform: scaleX(0.7); }

/* ── SCREEN ── */
.screen {
max-width: 420px;
margin: 0 auto;
padding: 28px 16px 40px;
}
.page-title {
font-size: 28px; font-weight: 900; color: #000; letter-spacing: -0.3px; margin-bottom: 24px;
animation: fadeDown 0.5s ease 0.15s both;
}

/* ── TICKET CARD ── */
.ticket-wrapper {
margin-bottom: 24px;
animation: cardReveal 0.8s cubic-bezier(0.22,1,0.36,1) 0.25s both,
ticketFloat 4.5s ease-in-out 1.4s infinite;
perspective: 800px;
}

.ticket-card {
border-radius: 18px;
overflow: hidden;
position: relative;
background: linear-gradient(140deg, #1c0e5e, #2e1580, #4a1ea0, #3a1488, #1c0e5e);
background-size: 300% 300%;
animation: gradShift 7s ease infinite;
}

/* Shimmer */
.ticket-card .shimmer-layer {
position: absolute; inset: 0; z-index: 6; pointer-events: none; overflow: hidden; border-radius: 22px;
}
.ticket-card .shimmer-layer::after {
content: ‘’;
position: absolute; top: -50%; left: 0;
width: 30%; height: 200%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
animation: shimmer 4s ease-in-out 1.8s infinite;
}

/* Blob bg decoration */
.ticket-card .blob {
position: absolute;
border-radius: 60% 40% 55% 45% / 50% 60% 40% 55%;
animation: blobPulse 5s ease-in-out infinite;
pointer-events: none;
}
.blob-1 {
width: 200px; height: 180px;
background: radial-gradient(circle, rgba(200,80,200,0.5), rgba(120,20,180,0.2));
top: -40px; right: -30px;
animation-delay: 0s;
}
.blob-2 {
width: 140px; height: 130px;
background: radial-gradient(circle, rgba(255,160,50,0.25), transparent 70%);
bottom: 10px; left: 10px;
animation-delay: 2s;
}

/* ── TICKET TOP SECTION ── */
.ticket-top {
padding: 16px 18px 0;
position: relative; z-index: 3;
display: flex;
align-items: flex-start;
justify-content: space-between;
gap: 12px;
}

/* Prize badge thumbnail */
.prize-badge {
width: 68px; height: 68px;
border-radius: 12px;
background: linear-gradient(145deg, #0d0a28, #1a1050);
border: 2px solid rgba(255,220,80,0.35);
display: flex; flex-direction: column;
align-items: center; justify-content: center;
flex-shrink: 0;
position: relative;
overflow: hidden;
animation: starPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.8s both;
box-shadow: 0 0 0 1px rgba(255,220,80,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
}
.prize-badge::before {
content: ‘’;
position: absolute; inset: -8px;
background: radial-gradient(circle at 50% 50%, rgba(255,200,60,0.3), transparent 65%);
animation: blobPulse 3s ease-in-out infinite;
}
.prize-icon { font-size: 22px; position: relative; z-index: 1; animation: starSpin 8s linear infinite; }
.prize-badge-text {
font-size: 8px; font-weight: 900; color: #f5c842;
letter-spacing: 0.5px; text-align: center;
position: relative; z-index: 1; line-height: 1.3;
margin-top: 3px;
}

/* Right info on top */
.ticket-meta-right { flex: 1; text-align: right; padding-top: 4px; }
.ticket-no {
font-size: 11.5px; font-weight: 800; color: rgba(255,255,255,0.95);
animation: numberReveal 0.7s ease 1s both;
line-height: 1.4;
}
.ticket-issued {
font-size: 11px; color: rgba(255,255,255,0.5);
margin-top: 5px; line-height: 1.4;
}

/* ── DIVIDER ── */
.ticket-divider {
display: flex; align-items: center; gap: 0;
margin: 14px 0 0;
position: relative; z-index: 3;
}
.divider-notch {
width: 18px; height: 18px; border-radius: 50%;
background: #ebebeb; flex-shrink: 0;
}
.divider-line {
flex: 1;
border-top: 2px dashed rgba(255,255,255,0.15);
}

/* ── TICKET BOTTOM SECTION ── */
.ticket-bottom {
padding: 14px 18px 18px;
position: relative; z-index: 3;
}

.prize-amount {
font-size: 22px; font-weight: 900; color: #fff;
letter-spacing: -0.5px;
animation: fadeUp 0.5s ease 0.9s both, amountGlow 3s ease-in-out 2s infinite;
line-height: 1.1;
}
.prize-currency {
font-size: 12px; font-weight: 700; color: rgba(255,220,80,0.85);
margin-bottom: 4px;
animation: fadeUp 0.5s ease 0.85s both;
}

.ticket-details {
margin-top: 12px;
display: grid; grid-template-columns: 1fr 1fr;
gap: 10px;
animation: fadeUp 0.5s ease 1.05s both;
}
.detail-item { }
.detail-label { font-size: 9px; color: rgba(255,255,255,0.45); font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 2px; }
.detail-value { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.9); }

/* ── BUY MORE ── */
.btn-buy {
display: block; width: 100%;
background: linear-gradient(135deg, #5236c8, #3a22a0);
color: #fff;
font-size: 15px; font-weight: 800; letter-spacing: 1.5px;
text-transform: uppercase;
border: none; border-radius: 50px;
padding: 18px;
cursor: pointer;
position: relative; overflow: hidden;
margin-bottom: 28px;
animation: fadeUp 0.5s ease 1.2s both, btnPulse 2.5s ease-in-out 2.2s infinite;
transition: transform 0.18s ease, filter 0.18s ease;
}
.btn-buy::after {
content: ‘’;
position: absolute; top: -50%; left: 0;
width: 28%; height: 200%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
animation: btnShimmer 2.8s ease-in-out 2.2s infinite;
}
.btn-buy:active { transform: scale(0.97); filter: brightness(0.88); }

/* ── NOTE ── */
.note-text {
font-size: 13px; color: #aaa;
text-align: center; line-height: 1.6; padding: 0 10px;
animation: fadeUp 0.5s ease 1.35s both;
}
</style>

}

  color: #1f1f1f;

}

/* ACTIVE TEXT */

}

/* BLANK BUTTON (important fix) */
.blank .circle {
  background: white;
}

/* CLICK */
.circle:active {
  transform: scale(0.95);
}
</style>
</head>
